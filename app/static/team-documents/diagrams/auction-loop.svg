<svg xmlns="http://www.w3.org/2000/svg" width="920" height="440" viewBox="0 0 920 440" role="img" aria-labelledby="title desc">
  <title id="title">Surprise Set auction loop</title>
  <desc id="desc">Seven-step loop from start auction through reveal and reset.</desc>
  <defs>
    <style>
      .bg { fill: #fffaf4; }
      .node { fill: #ffffff; stroke: #d7c8b8; stroke-width: 2; }
      .hot { fill: #ffdf70; stroke: #7a4d00; stroke-width: 2; }
      .line { stroke: #27211c; stroke-width: 2.2; fill: none; }
      text { font-family: Inter, Arial, sans-serif; fill: #1d1a17; }
      .h { font-size: 26px; font-weight: 800; }
      .num { font-size: 18px; font-weight: 900; }
      .t { font-size: 16px; font-weight: 800; }
      .s { font-size: 12px; fill: #675b50; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27211c"/>
    </marker>
  </defs>
  <rect class="bg" width="920" height="440" rx="18"/>
  <text class="h" x="32" y="44">Run the same loop every auction</text>

  <rect class="hot" x="68" y="104" width="150" height="78" rx="16"/>
  <text class="num" x="90" y="134">1</text>
  <text class="t" x="116" y="134">Start</text>
  <text class="s" x="90" y="160">Dollar start is live</text>

  <rect class="node" x="286" y="104" width="150" height="78" rx="16"/>
  <text class="num" x="308" y="134">2</text>
  <text class="t" x="334" y="134">Wall</text>
  <text class="s" x="308" y="160">Name top hits</text>

  <rect class="node" x="504" y="104" width="150" height="78" rx="16"/>
  <text class="num" x="526" y="134">3</text>
  <text class="t" x="552" y="134">Tap card</text>
  <text class="s" x="526" y="160">Tell viewers to check it</text>

  <rect class="hot" x="702" y="104" width="150" height="78" rx="16"/>
  <text class="num" x="724" y="134">4</text>
  <text class="t" x="750" y="134">Push</text>
  <text class="s" x="724" y="160">Bid + countdown</text>

  <rect class="node" x="602" y="276" width="150" height="78" rx="16"/>
  <text class="num" x="624" y="306">5</text>
  <text class="t" x="650" y="306">Reveal</text>
  <text class="s" x="624" y="332">Watch result</text>

  <rect class="node" x="384" y="276" width="150" height="78" rx="16"/>
  <text class="num" x="406" y="306">6</text>
  <text class="t" x="432" y="306">Name it</text>
  <text class="s" x="406" y="332">Hit or base, be clean</text>

  <rect class="hot" x="166" y="276" width="150" height="78" rx="16"/>
  <text class="num" x="188" y="306">7</text>
  <text class="t" x="214" y="306">Reset</text>
  <text class="s" x="188" y="332">Next one immediately</text>

  <path class="line" d="M 218 143 L 286 143" marker-end="url(#arrow)"/>
  <path class="line" d="M 436 143 L 504 143" marker-end="url(#arrow)"/>
  <path class="line" d="M 654 143 L 702 143" marker-end="url(#arrow)"/>
  <path class="line" d="M 777 182 C 774 232, 737 259, 700 276" marker-end="url(#arrow)"/>
  <path class="line" d="M 602 315 L 534 315" marker-end="url(#arrow)"/>
  <path class="line" d="M 384 315 L 316 315" marker-end="url(#arrow)"/>
  <path class="line" d="M 166 315 C 80 292, 58 202, 94 181" marker-end="url(#arrow)"/>
</svg>
