<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Recommended live stream visual setup</title>
  <desc id="desc">Camera frames a center hit wall, base stacks, host lane, and monitor prompts.</desc>
  <defs>
    <style>
      .bg { fill: #fffaf4; }
      .line { stroke: #27211c; stroke-width: 2; fill: none; }
      .soft { fill: #f2e8dc; stroke: #d7c8b8; stroke-width: 2; }
      .hit { fill: #ffdf70; stroke: #7a4d00; stroke-width: 2; }
      .base { fill: #d8f0ff; stroke: #2a617c; stroke-width: 2; }
      .host { fill: #e9ddff; stroke: #604f8d; stroke-width: 2; }
      .call { fill: #ffffff; stroke: #a99683; stroke-width: 2; }
      text { font-family: Inter, Arial, sans-serif; fill: #1d1a17; }
      .h { font-size: 26px; font-weight: 800; }
      .t { font-size: 17px; font-weight: 700; }
      .s { font-size: 14px; }
      .tiny { font-size: 12px; fill: #675b50; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27211c"/>
    </marker>
  </defs>
  <rect class="bg" width="920" height="520" rx="18"/>
  <text class="h" x="32" y="46">Camera view: sell the wall, tell viewers to verify the card</text>

  <rect class="soft" x="54" y="88" width="590" height="312" rx="16"/>
  <text class="t" x="74" y="122">Product wall inside frame</text>
  <text class="tiny" x="74" y="145">Everything important should fit here without moving the phone.</text>

  <rect class="hit" x="236" y="150" width="220" height="112" rx="10"/>
  <text class="t" x="272" y="196">TOP HITS</text>
  <text class="s" x="262" y="222">ETB / UPC / booster box</text>

  <rect class="base" x="84" y="170" width="124" height="162" rx="10"/>
  <text class="t" x="112" y="226">BASE</text>
  <text class="s" x="101" y="252">pack stack</text>

  <rect class="base" x="486" y="170" width="124" height="162" rx="10"/>
  <text class="t" x="514" y="226">BASE</text>
  <text class="s" x="503" y="252">pack stack</text>

  <rect class="hit" x="228" y="286" width="236" height="70" rx="10"/>
  <text class="s" x="255" y="326">mid hits across front row</text>

  <path class="line" d="M 688 116 C 650 150, 636 205, 624 260" marker-end="url(#arrow)"/>
  <rect class="host" x="678" y="88" width="190" height="92" rx="14"/>
  <text class="t" x="706" y="124">Host lane</text>
  <text class="s" x="700" y="149">stand off-center</text>
  <text class="tiny" x="700" y="168">point, do not block hits</text>

  <rect class="call" x="676" y="216" width="192" height="86" rx="14"/>
  <text class="t" x="703" y="249">Prompt card</text>
  <text class="s" x="697" y="274">count + top hits + lines</text>

  <rect class="call" x="184" y="430" width="392" height="58" rx="20"/>
  <text class="t" x="210" y="464">Viewer taps their own TikTok card</text>
  <text class="tiny" x="220" y="482">Auction timer, bid button, remaining count</text>

  <path class="line" d="M 380 430 L 380 376" marker-end="url(#arrow)"/>
  <rect class="call" x="34" y="420" width="112" height="68" rx="14"/>
  <text class="t" x="63" y="448">Phone</text>
  <text class="tiny" x="52" y="470">locked frame</text>
</svg>
