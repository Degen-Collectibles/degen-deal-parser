{% extends "team/_auth_shell.html" %}
{% block auth_sub %}
<p class="pt-auth-sub">Pick a new password. You'll be signed in right after.</p>
{% endblock %}
{% block content %}
<form method="post" action="/team/password/reset/{{ token }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="pt-field">
        <label class="pt-field-label" for="new_password">New password</label>
        <span class="pt-pw-wrap">
            <input class="pt-input" type="password" name="new_password" id="new_password" required autofocus autocomplete="new-password" placeholder="At least 12 characters">
            <button type="button" class="pt-pw-toggle"
                    data-pw-target="new_password" aria-label="Show password" aria-pressed="false">Show</button>
        </span>
        <div style="font-size:12px; color:var(--pt-muted); margin-top:6px;">Min 12 chars · 3 of: lowercase, UPPERCASE, number, symbol.</div>
    </div>
    <button class="pt-btn primary lg" type="submit" style="width:100%;">Set password</button>
</form>
<script>
(function(){
    document.querySelectorAll('[data-pw-target]').forEach(function(btn){
        btn.addEventListener('click', function(){
            var target = document.getElementById(btn.getAttribute('data-pw-target'));
            if (!target) return;
            var showing = target.type === 'text';
            target.type = showing ? 'password' : 'text';
            btn.textContent = showing ? 'Show' : 'Hide';
            btn.setAttribute('aria-pressed', showing ? 'false' : 'true');
            btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
        });
    });
})();
</script>
{% endblock %}
