name: Deploy to Degen Prod

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, degen-prod]
    defaults:
      run:
        working-directory: /opt/degen/app

    steps:
      - name: Redeploy app
        run: ./scripts/redeploy-linux.sh

      - name: Verify health
        run: curl -fsS http://127.0.0.1:8000/health >/dev/null
