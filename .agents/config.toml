# Project-local Codex/Ruflo integration.
#
# This intentionally only declares the Ruflo MCP sidecar. Runtime behavior,
# model selection, approval policy, and sandbox policy stay controlled by the
# active Codex/OpenClaw environment.

[mcp_servers.ruflo]
command = "npx"
args = ["--yes", "ruflo@3.7.0-alpha.45", "mcp", "start"]
enabled = true
tool_timeout_sec = 120
